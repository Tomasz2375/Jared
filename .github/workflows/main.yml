on:
  push:
    brancheds:
      - master-pipline
  pull-request:
    branches:
      - master-pipline
  workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: action/checkout@v2
        - name: Setup .NET Core SDK
          uses: actions/setup-dotnet@v4.0.1
          with:
            dotnet-version: 6.0.x
        - name: Restore depedencies
          run: dotnet restore
        - name: Build
          run: dotnet build --no-restore
        - name: Test
          run: dotnet test
